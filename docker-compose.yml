version: '3.8'

services:
  # SERVICE 1: MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      # maps local folder to folder inside the container
      - ./notebooks/mlruns:/mlflow/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite://mlflow/mlruns/mlflow.db
      --default-artifact-root /mlflow/mlruns
      --host 0.0.0.0
      --port 5000
  
  # SERVICE 2: FastAPI Application
  api:
    build: .
    container_name: credit_api
    depends_on:
      - mlflow
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_NAME=CreditDefault_XGB
      - MODEL_VERSION=3
  